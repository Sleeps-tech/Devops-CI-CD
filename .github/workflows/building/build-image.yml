name: Build & Push Docker Image

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name without tag (e.g. myorg/myservice)"
        required: true
        type: string
      project_type:
        description: "Project type used to select Dockerfile (e.g. go-app, python-django-app)"
        required: true
        type: string
      registry_host:
        description: "Container registry host (e.g. registry.example.com)"
        required: true
        type: string
      dockerfile_repo:
        description: "Repository containing Dockerfiles (org/repo). Defaults to current repo."
        required: false
        type: string
        default: ""
      dockerfile_ref:
        description: "Git ref of the Dockerfiles repository"
        required: false
        type: string
        default: "main"
    secrets:
      registry_username:
        description: "Container registry username"
        required: true
      registry_password:
        description: "Container registry password"
        required: true

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout application source
        uses: actions/checkout@v4

      # Если Dockerfiles хранятся в отдельном репо (этом ci-cd репо) — чекаутим его
      - name: Checkout Dockerfiles repository
        if: inputs.dockerfile_repo != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.dockerfile_repo }}
          ref: ${{ inputs.dockerfile_ref }}
          path: _ci_cd_repo

      - name: Determine image tag
        id: tag
        run: |
          if [[ -n "$GITHUB_REF" && "$GITHUB_REF" == refs/tags/* ]]; then
            IMAGE_TAG="${GITHUB_REF#refs/tags/}"
          else
            # Slug: replace / with - and lowercase (mirrors CI_COMMIT_REF_SLUG)
            IMAGE_TAG="${GITHUB_REF_NAME//\//-}"
            IMAGE_TAG="${IMAGE_TAG,,}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ inputs.registry_host }}/${{ inputs.image_name }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry_host }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_password }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Dockerfile path
        id: dockerfile
        run: |
          if [[ -n "${{ inputs.dockerfile_repo }}" ]]; then
            echo "path=_ci_cd_repo/dockerfiles/Dockerfile.${{ inputs.project_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "path=dockerfiles/Dockerfile.${{ inputs.project_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.tag.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
