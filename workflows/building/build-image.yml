.build_image:
  image:
    name: $CONTAINER_REGISTRY/dev-containers/deployment/kaniko_executor:latest
    entrypoint: [""]

  script:
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG"
      fi

      CONTAINER_BUILD_IMAGE="$CONTAINER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG"

      echo "Building image: $CONTAINER_BUILD_IMAGE"

    - |
      echo "{\"auths\":{\"${CONTAINER_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CONTAINER_REGISTRY_USER}" "${CONTAINER_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > \
      /kaniko/.docker/config.json

    - cp /workspace/Dockerfile.$PROJECT_TYPE .

    - /kaniko/executor --context . --dockerfile Dockerfile.$PROJECT_TYPE --destination $CONTAINER_BUILD_IMAGE

  allow_failure: false

  rules:
    - if: $CI_COMMIT_TAG

    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*$/'

    - if: '$CI_COMMIT_BRANCH =~ /^fix\/.*$/'

    - if: '$CI_COMMIT_BRANCH =~ /^hotfix\/.*$/'

    - when: never
