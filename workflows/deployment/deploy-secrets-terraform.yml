.deploy_secrets:
  image: $ARTIFACT_REGISTRY_HOST/dev-containers/deployment/terraform_deploy:latest
  script:
    # Определяем путь до папки terraform
    - |
      if [ -z "$TERRAFORM_DIR" ]; then
          TERRAFORM_DIR="terraform"
      fi

    # Задаем конфиг подключения к кластеру
    - |
      KUBECONFIG_VAR_NAME="${DEPLOY_ENV}_KUBECONFIG"
      KUBECONFIG_VALUE=$(printenv "$KUBECONFIG_VAR_NAME")
      echo "$KUBECONFIG_VALUE" | base64 -d > "${TERRAFORM_DIR}/.kubeconfig"

    # Экспортируем приватный ключ
    - mkdir /root/.config && mkdir /root/.config/sops && mkdir /root/.config/sops/age
    - echo "$AGE_PRIVATE_KEY" | base64 -d > /root/.config/sops/age/keys.txt

    # Кладем .sops.yaml в нужное место
    - cp "secrets/sops.${DEPLOY_ENV}.yaml" /root/.sops.yaml

    # Переходим в директорию terraform
    - cd "$TERRAFORM_DIR"

    - terraform version

    # Инициализируем terraform
    - terraform init

    # Переходим в workspace проекта
    - terraform workspace select "${TERRAFORM_WORKSPACE}-secrets" || terraform workspace new "${TERRAFORM_WORKSPACE}-secrets"

    # Применяем конфигурацию
    - terraform apply -auto-approve -var="env=${DEPLOY_ENV}" -var="chart_registry=${ARTIFACT_REGISTRY_HOST}" -var="chart_registry_username=${ARTIFACT_REGISTRY_USER}" -var="chart_registry_password=${ARTIFACT_REGISTRY_PASSWORD}"
  only:
    - main
